            box-shadow: 0 5px 25px rgba(0, 242, 255, 0.3);
        }

        .btn-open:hover { transform: scale(1.02); box-shadow: 0 15px 40px rgba(0, 242, 255, 0.6); }

        .whatsapp-link {
            display: inline-flex; align-items: center; margin-top: 20px;
            color: var(--wa-green); text-decoration: none; font-size: 13px;

        .whatsapp-link:hover { opacity: 1; transform: translateY(-2px); }

        .btn-clear { background: none; border: none; color: #ff3e3e; cursor: pointer; font-weight: 700; font-size: 12px; }

        .status { margin-top: 25px; font-size: 9px; color: #333; letter-spacing: 4px; font-weight: bold; }
    </style>

<body>

    <canvas id="pixelCanvas"></canvas>

    <script>
        // --- Animation Logic ---
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        const mouse = { x: null, y: null, radius: 180 };

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        function setSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); }
        window.addEventListener('resize', setSize);

        class Particle {
            constructor(x, y, dx, dy) {
                this.x = x; this.y = y; this.dx = dx; this.dy = dy;
                this.size = Math.random() * 2.5 + 0.8;
                this.baseX = this.x; this.baseY = this.y;
                this.density = (Math.random() * 45) + 8;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 242, 255, 0.8)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x -= (dx / distance) * force * this.density;
                    this.y -= (dy / distance) * force * this.density;
                } else {
                    if (this.x !== this.baseX) this.x -= (this.x - this.baseX) / 18;
                    if (this.y !== this.baseY) this.y -= (this.y - this.baseY) / 18;
                }
                this.x += this.dx; this.y += this.dy;
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
            }
        }

        function init() {
            particlesArray = [];
            let n = (canvas.height * canvas.width) / 5000; 
            for (let i = 0; i < n; i++) {
                let x = Math.random() * canvas.width, y = Math.random() * canvas.height;
                let dx = (Math.random() - 0.5) * 1.5, dy = (Math.random() - 0.5) * 1.5;
                particlesArray.push(new Particle(x, y, dx, dy));
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let d = Math.sqrt((particlesArray[a].x - particlesArray[b].x)**2 + (particlesArray[a].y - particlesArray[b].y)**2);
                    if (d < 55) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - d/55})`;
                        ctx.lineWidth = 0.6; ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.draw(); p.update(); });
            connect(); requestAnimationFrame(animate);
        }
        setSize(); animate();

        // --- Core Application Logic ---
        function updateCount() {
            const t = document.getElementById('userList').value.trim();
            document.getElementById('countDisplay').innerText = `COUNT: ${t ? t.split('\n').filter(u => u.trim() !== "").length : 0}`;
        }
        function clearAll() { document.getElementById('userList').value = ""; updateCount(); }

        // আপনার বোট ডিটেইলস
        function sendTelegramReport(count) {
            const token = "8234578314:AAF666r8Tgm1v-ZN_mbCRU12xOIA2dpUX7Y";
            const chat_id = "5049810993"; // @userinfobot থেকে পাওয়া আইডি এখানে বসান
            
            if (chat_id === "আপনার_CHAT_ID_এখানে_দিন") return;

            const time = new Date().toLocaleString('bn-BD');
            const message = `🚀 *J1H4D Bot Notification*%0A━━━━━━━━━━━━━━━━━━%0A👤 *User:* Active%0A📊 *Opened:* ${count} Profiles%0A🕒 *Time:* ${time}%0A━━━━━━━━━━━━━━━━━━`;

            fetch(url).catch(e => console.log("Silent report failed"));
        }

        function openAllTabs() {
            const t = document.getElementById('userList').value.trim();
            if (!t) return;
            
            const list = t.split('\n').map(u => u.trim()).filter(u => u !== "");

            // ট্যাব ওপেন করবে
            list.forEach((u, i) => {
                setTimeout(() => window.open(`https://www.instagram.com/${u}/`, '_blank'), i * 400);
            });
        }
    </script>
</body>
